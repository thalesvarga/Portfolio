<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thales Varga</title>
    <link rel="icon" href="/assets/logo.png" sizes="32x32" type="image/png"/>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Encode+Sans+SC:wght@100..900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap"
      rel="stylesheet"
    />



    <style>
      @font-face {
        font-family: "ChunkFive-Regular";
        src: url(fonts/ChunkFive-Regular.otf) format("opentype");
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        position: relative;
        background-color: #fffdfd;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url(/assets/IMG_20210813_143636_1.jpg);
        background-size: cover;
        background-position: center;
        opacity: 0.3;
        z-index: -1;
      }

      a {
        padding-top: 8rem;
      }

      h1 {
        position: fixed;
        font-size: 2vw;
        width: 30%;
        line-height: 1.5;
        margin: 3rem;
        text-align: center;
        font-family: "Encode Sans SC";
        color: #3d3d3d;
        transition: transform 0.3s ease;
        cursor: pointer;
        text-shadow: #3d3d3d;
        font-weight: 150;
        letter-spacing: 0.5rem;
      }

      h1:hover {
        opacity: 40%;
      }

      .line-break {
        font-size: 1vw;
      }

      /* Cantoneiras nos cantos */
      .corner {
        width: 50px;
        height: 50px;
        position: absolute;
        border: 1px solid black;
        margin: 1rem;
        border-radius: 3px;
        opacity: 20%;
      }

      /* Cantos específicos */
      .corner.top-left {
        top: 0;
        left: 0;
        border-right: none;
        border-bottom: none;
        border-top-left-radius: 15px;
      }

      .corner.top-right {
        top: 0;
        right: 0;
        border-left: none;
        border-bottom: none;
        border-top-right-radius: 15px;
      }

      .corner.bottom-left {
        bottom: 0;
        left: 0;
        border-right: none;
        border-top: none;
        border-bottom-left-radius: 15px;
      }

      .corner.bottom-right {
        bottom: 0;
        right: 0;
        border-left: none;
        border-top: none;
        border-bottom-right-radius: 15px;
      }

      @media (max-width: 414px) {
        h1 {
          font-size: 4vw;
        }
        .line-break {
          font-size: 2.2vw;
        }
      }
    </style>
  </head>

  <body>

    <a href="html/portfolio.html">
      <h1>
        Thales Varga
        <span class="line-break">PORTFÓLIO</span>
      </h1>
    </a>

    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>
  </body>
</html>
